syntax = "proto3";

package vldb.duckdb.v1;

option go_package = "vldb-duckdb-go-demo/proto/v1;duckdbv1";

service DuckDbService {
  // Execute a DDL, DML, or implicit-transaction SQL script without returning rows.
  rpc ExecuteScript(ExecuteRequest) returns (ExecuteResponse);

  // Execute a SELECT-style query and return its Arrow IPC stream as gRPC chunks.
  rpc QueryStream(QueryRequest) returns (stream QueryResponse);

  // Execute a SELECT-style query and return JSON rows directly.
  rpc QueryJson(QueryRequest) returns (QueryJsonResponse);
}

message ExecuteRequest {
  string sql = 1;
  string params_json = 2;
}

message ExecuteResponse {
  bool success = 1;
  string message = 2;
}

message QueryRequest {
  string sql = 1;
  string params_json = 2;
}

message QueryResponse {
  bytes arrow_ipc_chunk = 1;
}

message QueryJsonResponse {
  string json_data = 1;
}
