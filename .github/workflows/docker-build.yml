name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '选择运行模式'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - cloud (ubuntu-latest)

jobs:
  build-and-push:
    # 【核心改动】：使用数组格式确保匹配 self-hosted 且具备特定标签的机器
    runs-on: ${{ github.event.inputs.mode == 'local' && fromJSON(format('["self-hosted", "{0}"]', matrix.runner_tag)) || 'ubuntu-latest' }}
    
    strategy:
      fail-fast: false # 即使其中一个挂了，另一个也继续编
      matrix:
        include:
          - service: vldb-duckdb
            runner_tag: 9950x      # 必须与你网页端填写的标签完全一致
          - service: vldb-lancedb
            runner_tag: proart     # 必须与你网页端填写的标签完全一致

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 模拟 ARM 环境，为 iStoreOS 打造镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
          # 缓存逻辑：
          # 本地模式时，不传 cache-from/to，Docker 会自动使用本地磁盘的 buildkit 目录。
          # 只有云端模式才启用 GitHub Actions 远程缓存。
          cache-from: ${{ github.event.inputs.mode == 'cloud (ubuntu-latest)' && format('type=gha,scope={0}', matrix.service) || '' }}
          cache-to: ${{ github.event.inputs.mode == 'cloud (ubuntu-latest)' && format('type=gha,mode=max,scope={0}', matrix.service) || '' }}