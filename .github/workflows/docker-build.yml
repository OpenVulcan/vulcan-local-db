name: Build and Push Docker Images

# 触发条件：当你推送代码到 main 分支，或者打 v 开头的 tag 时
on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 【核心技巧】：使用矩阵策略，自动把下面的步骤跑两遍，分别对应两个引擎
    strategy:
      matrix:
        service: [vldb-duckdb, vldb-lancedb]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 QEMU 以支持编译 iStoreOS 所需的 ARM64 架构
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 启用 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 核心编译与推送步骤
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          # 上下文目录指向各自的子目录
          context: ./${{ matrix.service }}
          # 指向各自的 Dockerfile
          file: ./${{ matrix.service }}/Dockerfile
          # 一键输出 x86 和 ARM64 两个架构
          platforms: linux/amd64,linux/arm64
          push: true
          # 镜像命名：例如 openvulcan/vldb-duckdb:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest