name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      duckdb_runner:
        description: '指派 vldb-duckdb 的执行节点'
        required: true
        default: '9950x'
        type: choice
        options:
          - '9950x'
          - 'proart'
          - 'ubuntu-latest'
      lancedb_runner:
        description: '指派 vldb-lancedb 的执行节点'
        required: true
        default: 'proart'
        type: choice
        options:
          - 'proart'
          - '9950x'
          - 'ubuntu-latest'

jobs:
  build-and-push:
    # 核心逻辑：根据 matrix 里的 choice 动态生成 runs-on
    # 如果选了 ubuntu-latest，就直接跑；否则组合成 ["self-hosted", "标签"]
    runs-on: ${{ matrix.choice == 'ubuntu-latest' && 'ubuntu-latest' || fromJSON(format('["self-hosted", "{0}"]', matrix.choice)) }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: vldb-duckdb
            choice: ${{ github.event.inputs.duckdb_runner }}
          - service: vldb-lancedb
            choice: ${{ github.event.inputs.lancedb_runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
          # 缓存优化：如果是云端节点，开启 GHA 远程缓存；本地节点直接利用本地硬盘，不传 cache 参数
          cache-from: ${{ matrix.choice == 'ubuntu-latest' && format('type=gha,scope={0}', matrix.service) || '' }}
          cache-to: ${{ matrix.choice == 'ubuntu-latest' && format('type=gha,mode=max,scope={0}', matrix.service) || '' }}