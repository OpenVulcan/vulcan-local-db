name: Build Native Release Binaries

on:
  workflow_dispatch:
    inputs:
      duckdb_linux_runner:
        description: "指派 vldb-duckdb 的 Linux x64 原生编译节点"
        required: true
        default: "ubuntu-24.04"
        type: choice
        options:
          - "9950x"
          - "proart"
          - "ubuntu-24.04"
      lancedb_linux_runner:
        description: "指派 vldb-lancedb 的 Linux x64 原生编译节点"
        required: true
        default: "ubuntu-24.04"
        type: choice
        options:
          - "9950x"
          - "proart"
          - "ubuntu-24.04"
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: native-release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.service }} • ${{ matrix.target }}
    # 【修复 1】：强制将所有结果统一化为 JSON Array，完美避开静态解析器的类型冲突！
    runs-on: ${{ fromJSON( matrix.runner_mode == 'dynamic' && matrix.runner != 'ubuntu-24.04' && format('["self-hosted", "{0}"]', matrix.runner) || format('["{0}"]', matrix.runner) ) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: ${{ inputs.lancedb_linux_runner || 'ubuntu-24.04' }}
            runner_mode: dynamic
            target: x86_64-unknown-linux-gnu
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: ubuntu-24.04-arm
            runner_mode: fixed
            target: aarch64-unknown-linux-gnu
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: macos-13    # 【修复 2】：纠正为有效的 Intel 节点
            runner_mode: fixed
            target: x86_64-apple-darwin
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: macos-15
            runner_mode: fixed
            target: aarch64-apple-darwin
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: windows-latest
            runner_mode: fixed
            target: x86_64-pc-windows-msvc
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: ${{ inputs.duckdb_linux_runner || 'ubuntu-24.04' }}
            runner_mode: dynamic
            target: x86_64-unknown-linux-gnu
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: ubuntu-24.04-arm
            runner_mode: fixed
            target: aarch64-unknown-linux-gnu
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: macos-13    # 【修复 2】：纠正为有效的 Intel 节点
            runner_mode: fixed
            target: x86_64-apple-darwin
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: macos-15
            runner_mode: fixed
            target: aarch64-apple-darwin
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: windows-latest
            runner_mode: fixed
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          missing=0
          for pkg in pkg-config cmake clang protoc; do
            if ! command -v "$pkg" >/dev/null 2>&1; then
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ] || ! dpkg -s libssl-dev >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pkg-config cmake clang libssl-dev protobuf-compiler
          fi

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          missing=0
          for tool in cmake protoc; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            brew update
            brew install cmake protobuf
          fi

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $missing = @()
          foreach ($tool in @('cmake', 'protoc')) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              $missing += $tool
            }
          }

          if ($missing.Count -gt 0) {
            choco install -y cmake protoc --no-progress
          }

      - name: Set up Rust toolchain on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustup target add $env:TARGET

      - name: Set up Rust toolchain on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustup target add "$TARGET"

      - name: Cache Rust build outputs on Windows
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            ${{ matrix.service }}\target
          key: native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.service)) }}
          restore-keys: |
            native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-
            native-release-${{ runner.os }}-${{ matrix.service }}-

      - name: Cache Rust build outputs on Unix
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.service }}/target
          key: native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.service)) }}
          restore-keys: |
            native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-
            native-release-${{ runner.os }}-${{ matrix.service }}-

      - name: Build release binary
        working-directory: ${{ matrix.service }}
        env:
          CARGO_TERM_COLOR: always
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release archive on Windows runner
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SERVICE: ${{ matrix.service }}
          BINARY: ${{ matrix.binary }}
          TARGET: ${{ matrix.target }}
        run: |
          $serviceDir = Join-Path $env:GITHUB_WORKSPACE $env:SERVICE
          $cargoToml = Join-Path $serviceDir 'Cargo.toml'
          $content = Get-Content $cargoToml -Raw
          if ($content -match '(?m)^version\s*=\s*"([^"]+)"') {
            $version = $Matches[1]
          } else {
            $version = 'unknown'
          }

          $isWindowsTarget = $env:TARGET -like '*windows*'
          $ext = if ($isWindowsTarget) { '.exe' } else { '' }
          $packageName = "$($env:BINARY)-v$version-$($env:TARGET)"
          $binPath = Join-Path $serviceDir "target/$($env:TARGET)/release/$($env:BINARY)$ext"
          $distDir = (New-Item -ItemType Directory -Force -Path (Join-Path $env:GITHUB_WORKSPACE 'dist')).FullName
          $stageDir = (New-Item -ItemType Directory -Force -Path (Join-Path $distDir $packageName)).FullName
          $archiveExt = if ($isWindowsTarget) { '.zip' } else { '.tar.gz' }
          $archivePath = Join-Path $distDir "$packageName$archiveExt"
          $checksumPath = "$archivePath.sha256"

          if (!(Test-Path $binPath)) {
            Write-Error "Binary not found at $binPath"
            exit 1
          }

          Copy-Item $binPath (Join-Path $stageDir "$($env:BINARY)$ext")

          $exampleFile = Join-Path $serviceDir "$($env:BINARY).json.example"
          if (Test-Path $exampleFile) {
            Copy-Item $exampleFile $stageDir
          }

          foreach ($fileName in @('README.md', 'LICENSE')) {
            $localPath = Join-Path $serviceDir $fileName
            $rootPath = Join-Path $env:GITHUB_WORKSPACE $fileName
            if (Test-Path $localPath) {
              Copy-Item $localPath $stageDir
            } elseif (Test-Path $rootPath) {
              Copy-Item $rootPath $stageDir
            }
          }

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          if (Test-Path $checksumPath) {
            Remove-Item $checksumPath -Force
          }

          if ($isWindowsTarget) {
            Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $archivePath -CompressionLevel Optimal
          } else {
            tar -czf $archivePath -C $distDir $packageName
          }

          $hash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLower()
          "$hash  $(Split-Path -Leaf $archivePath)" | Out-File -FilePath $checksumPath -Encoding ascii -NoNewline

      - name: Package release archive on Unix runner
        if: runner.os != 'Windows'
        shell: bash
        env:
          SERVICE: ${{ matrix.service }}
          BINARY: ${{ matrix.binary }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          service_dir="$GITHUB_WORKSPACE/$SERVICE"
          cargo_toml="$service_dir/Cargo.toml"
          version="$(sed -nE 's/^version\s*=\s*"([^"]+)"/\1/p' "$cargo_toml" | head -n1)"
          if [[ -z "$version" ]]; then
            version="unknown"
          fi

          if [[ "$TARGET" == *windows* ]]; then
            ext=".exe"
            archive_ext=".zip"
          else
            ext=""
            archive_ext=".tar.gz"
          fi

          package_name="${BINARY}-v${version}-${TARGET}"
          bin_path="$service_dir/target/$TARGET/release/$BINARY$ext"
          dist_dir="$GITHUB_WORKSPACE/dist"
          stage_dir="$dist_dir/$package_name"
          archive_path="$dist_dir/$package_name$archive_ext"
          checksum_path="$archive_path.sha256"

          mkdir -p "$stage_dir"

          if [[ ! -f "$bin_path" ]]; then
            echo "Binary not found at $bin_path" >&2
            exit 1
          fi

          cp "$bin_path" "$stage_dir/$BINARY$ext"

          example_file="$service_dir/$BINARY.json.example"
          if [[ -f "$example_file" ]]; then
            cp "$example_file" "$stage_dir/"
          fi

          for file_name in README.md LICENSE; do
            if [[ -f "$service_dir/$file_name" ]]; then
              cp "$service_dir/$file_name" "$stage_dir/"
            elif [[ -f "$GITHUB_WORKSPACE/$file_name" ]]; then
              cp "$GITHUB_WORKSPACE/$file_name" "$stage_dir/"
            fi
          done

          rm -f "$archive_path" "$checksum_path"

          if [[ "$archive_ext" == ".zip" ]]; then
            python3 - "$stage_dir" "$archive_path" <<'PY'
import os
import sys
import zipfile

stage_dir, archive_path = sys.argv[1], sys.argv[2]
base_dir = os.path.dirname(stage_dir)

with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
    for root, _, files in os.walk(stage_dir):
        for filename in files:
            full_path = os.path.join(root, filename)
            rel_path = os.path.relpath(full_path, base_dir)
            zf.write(full_path, rel_path)
PY
          else
            # 【修复 3】：纠正变量名称拼写，确保能够正确找到路径
            tar -czf "$archive_path" -C "$dist_dir" "$package_name"
          fi

          python3 - "$archive_path" "$checksum_path" <<'PY'
import hashlib
import os
import sys

archive_path, checksum_path = sys.argv[1], sys.argv[2]
hasher = hashlib.sha256()
with open(archive_path, "rb") as f:
    for chunk in iter(lambda: f.read(1024 * 1024), b""):
        hasher.update(chunk)

with open(checksum_path, "w", encoding="ascii", newline="") as f:
    f.write(f"{hasher.hexdigest()}  {os.path.basename(archive_path)}")
PY

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14
