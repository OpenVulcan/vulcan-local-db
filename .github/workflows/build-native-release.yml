name: Build Native Release Binaries

on:
  workflow_dispatch:
    inputs:
      # ================= LANCEDb 算力分配盘 (默认: 9950X 阵列) =================
      lancedb_linux_x64:
        description: "[LanceDB] Linux x64 节点"
        required: true
        default: "9950x"
        type: choice
        options: [ "9950x", "proart", "ubuntu-24.04" ]
      lancedb_linux_arm:
        description: "[LanceDB] Linux ARM 节点"
        required: true
        default: "9950x"
        type: choice
        options: [ "9950x", "proart", "ubuntu-24.04" ]
      lancedb_mac_arm:
        description: "[LanceDB] macOS ARM 节点"
        required: true
        default: "macos-15"
        type: choice
        options: [ "macos-15", "9950x", "proart" ]
      lancedb_win_x64:
        description: "[LanceDB] Windows x64 节点"
        required: true
        default: "9950x-win"
        type: choice
        options: [ "9950x-win", "proart-win", "windows-latest" ]
        
      # ================= DuckDB 算力分配盘 (默认: ProArt 阵列) =================
      duckdb_linux_x64:
        description: "[DuckDB] Linux x64 节点"
        required: true
        default: "proart"
        type: choice
        options: [ "proart", "9950x", "ubuntu-24.04" ]
      duckdb_linux_arm:
        description: "[DuckDB] Linux ARM 节点"
        required: true
        default: "proart"
        type: choice
        options: [ "proart", "9950x", "ubuntu-24.04" ]
      duckdb_mac_arm:
        description: "[DuckDB] macOS ARM 节点"
        required: true
        default: "macos-15"
        type: choice
        options: [ "macos-15", "proart", "9950x" ]
      duckdb_win_x64:
        description: "[DuckDB] Windows x64 节点"
        required: true
        default: "proart-win"
        type: choice
        options: [ "proart-win", "9950x-win", "windows-latest" ]

  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: native-release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

# 全局强制使用 Node.js 24，彻底消灭弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.service }} • ${{ matrix.target }}
    # 【智能算力路由】：自动识别云端还是本地，动态生成 runner 数组
    runs-on: >-
      ${{ 
        (startsWith(matrix.runner, 'ubuntu') || startsWith(matrix.runner, 'macos') || startsWith(matrix.runner, 'windows')) 
        && fromJSON(format('["{0}"]', matrix.runner)) 
        || fromJSON(format('["self-hosted", "{0}"]', matrix.runner)) 
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- LanceDB 矩阵 (绑定 9950x 默认值) ---
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: ${{ inputs.lancedb_linux_x64 || '9950x' }}
            target: x86_64-unknown-linux-gnu
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: ${{ inputs.lancedb_linux_arm || '9950x' }} 
            target: aarch64-unknown-linux-gnu
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: ${{ inputs.lancedb_mac_arm || 'macos-15' }}
            target: aarch64-apple-darwin
          - service: vldb-lancedb
            binary: vldb-lancedb
            runner: ${{ inputs.lancedb_win_x64 || '9950x-win' }}
            target: x86_64-pc-windows-msvc
            
          # --- DuckDB 矩阵 (绑定 proart 默认值) ---
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: ${{ inputs.duckdb_linux_x64 || 'proart' }}
            target: x86_64-unknown-linux-gnu
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: ${{ inputs.duckdb_linux_arm || 'proart' }} 
            target: aarch64-unknown-linux-gnu
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: ${{ inputs.duckdb_mac_arm || 'macos-15' }}
            target: aarch64-apple-darwin
          - service: vldb-duckdb
            binary: vldb-duckdb
            runner: ${{ inputs.duckdb_win_x64 || 'proart-win' }}
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          missing=0
          for pkg in pkg-config cmake clang protoc aarch64-linux-gnu-gcc aarch64-linux-gnu-g++; do
            if ! command -v "$pkg" >/dev/null 2>&1; then
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ] || ! dpkg -s libssl-dev >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y pkg-config cmake clang libssl-dev protobuf-compiler zip gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          if ! command -v cmake >/dev/null 2>&1; then
            brew install cmake
          fi
          if ! command -v protoc >/dev/null 2>&1; then
            brew install protobuf
          fi

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $missing = @()
          foreach ($tool in @('cmake', 'protoc')) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              $missing += $tool
            }
          }

          if ($missing.Count -gt 0) {
            choco install -y cmake protoc --no-progress
          }

      - name: Set up Rust toolchain on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustup target add $env:TARGET

      - name: Set up Rust toolchain on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustup target add "$TARGET"

      - name: Cache Rust build outputs on Windows
        # 【智能判断】：如果分配的节点名字以 'windows' 开头 (即云端)，才执行缓存
        if: runner.os == 'Windows' && startsWith(matrix.runner, 'windows')
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            ${{ matrix.service }}\target
          key: native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.service)) }}
          restore-keys: |
            native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-
            native-release-${{ runner.os }}-${{ matrix.service }}-

      - name: Cache Rust build outputs on Unix
        # 【智能判断】：如果分配的节点名字以 'ubuntu' 或 'macos' 开头 (即云端)，才执行缓存
        if: runner.os != 'Windows' && (startsWith(matrix.runner, 'ubuntu') || startsWith(matrix.runner, 'macos'))
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.service }}/target
          key: native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.service)) }}
          restore-keys: |
            native-release-${{ runner.os }}-${{ matrix.service }}-${{ matrix.target }}-
            native-release-${{ runner.os }}-${{ matrix.service }}-

      - name: Build release binary
        working-directory: ${{ matrix.service }}
        env:
          CARGO_TERM_COLOR: always
          MACOSX_DEPLOYMENT_TARGET: "12.0"
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.target == 'x86_64-apple-darwin' && 'x86_64' || (matrix.target == 'aarch64-apple-darwin' && 'arm64' || '') }}
          CFLAGS_x86_64_apple_darwin: "-target x86_64-apple-macos12"
          CXXFLAGS_x86_64_apple_darwin: "-target x86_64-apple-macos12"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: "aarch64-linux-gnu-gcc"
          CC_aarch64_unknown_linux_gnu: "aarch64-linux-gnu-gcc"
          CXX_aarch64_unknown_linux_gnu: "aarch64-linux-gnu-g++"
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release archive on Windows runner
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SERVICE: ${{ matrix.service }}
          BINARY: ${{ matrix.binary }}
          TARGET: ${{ matrix.target }}
        run: |
          $serviceDir = Join-Path $env:GITHUB_WORKSPACE $env:SERVICE
          $cargoToml = Join-Path $serviceDir 'Cargo.toml'
          $content = Get-Content $cargoToml -Raw
          if ($content -match '(?m)^version\s*=\s*"([^"]+)"') {
            $version = $Matches[1]
          } else {
            $version = 'unknown'
          }

          $isWindowsTarget = $env:TARGET -like '*windows*'
          $ext = if ($isWindowsTarget) { '.exe' } else { '' }
          $packageName = "$($env:BINARY)-v$version-$($env:TARGET)"
          $binPath = Join-Path $serviceDir "target/$($env:TARGET)/release/$($env:BINARY)$ext"
          $distDir = (New-Item -ItemType Directory -Force -Path (Join-Path $env:GITHUB_WORKSPACE 'dist')).FullName
          $stageDir = (New-Item -ItemType Directory -Force -Path (Join-Path $distDir $packageName)).FullName
          $archiveExt = if ($isWindowsTarget) { '.zip' } else { '.tar.gz' }
          $archivePath = Join-Path $distDir "$packageName$archiveExt"
          $checksumPath = "$archivePath.sha256"

          if (!(Test-Path $binPath)) {
            Write-Error "Binary not found at $binPath"
            exit 1
          }

          Copy-Item $binPath (Join-Path $stageDir "$($env:BINARY)$ext")

          $exampleFile = Join-Path $serviceDir "$($env:BINARY).json.example"
          if (Test-Path $exampleFile) {
            Copy-Item $exampleFile $stageDir
          }

          foreach ($fileName in @('README.md', 'LICENSE')) {
            $localPath = Join-Path $serviceDir $fileName
            $rootPath = Join-Path $env:GITHUB_WORKSPACE $fileName
            if (Test-Path $localPath) {
              Copy-Item $localPath $stageDir
            } elseif (Test-Path $rootPath) {
              Copy-Item $rootPath $stageDir
            }
          }

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          if (Test-Path $checksumPath) {
            Remove-Item $checksumPath -Force
          }

          if ($isWindowsTarget) {
            Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $archivePath -CompressionLevel Optimal
          } else {
            tar -czf $archivePath -C $distDir $packageName
          }

          $hash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLower()
          "$hash  $(Split-Path -Leaf $archivePath)" | Out-File -FilePath $checksumPath -Encoding ascii -NoNewline

      - name: Package release archive on Unix runner
        if: runner.os != 'Windows'
        shell: bash
        env:
          SERVICE: ${{ matrix.service }}
          BINARY: ${{ matrix.binary }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          service_dir="$GITHUB_WORKSPACE/$SERVICE"
          cargo_toml="$service_dir/Cargo.toml"
          
          # 【修复 1】：使用 POSIX 标准的 [[:space:]] 替换 \s，消灭 macOS 提取版本号失败导致的 vunknown 问题
          version="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)"/\1/p' "$cargo_toml" | head -n1)"
          if [[ -z "$version" ]]; then
            version="unknown"
          fi

          if [[ "$TARGET" == *windows* ]]; then
            ext=".exe"
            archive_ext=".zip"
          else
            ext=""
            archive_ext=".tar.gz"
          fi

          package_name="${BINARY}-v${version}-${TARGET}"
          bin_path="$service_dir/target/$TARGET/release/$BINARY$ext"
          dist_dir="$GITHUB_WORKSPACE/dist"
          stage_dir="$dist_dir/$package_name"
          archive_path="$dist_dir/$package_name$archive_ext"
          checksum_path="$archive_path.sha256"

          mkdir -p "$stage_dir"

          if [[ ! -f "$bin_path" ]]; then
            echo "Binary not found at $bin_path" >&2
            exit 1
          fi

          cp "$bin_path" "$stage_dir/$BINARY$ext"

          example_file="$service_dir/$BINARY.json.example"
          if [[ -f "$example_file" ]]; then
            cp "$example_file" "$stage_dir/"
          fi

          for file_name in README.md LICENSE; do
            if [[ -f "$service_dir/$file_name" ]]; then
              cp "$service_dir/$file_name" "$stage_dir/"
            elif [[ -f "$GITHUB_WORKSPACE/$file_name" ]]; then
              cp "$GITHUB_WORKSPACE/$file_name" "$stage_dir/"
            fi
          done

          rm -f "$archive_path" "$checksum_path"

          if [[ "$archive_ext" == ".zip" ]]; then
            (cd "$dist_dir" && zip -r -q "$(basename "$archive_path")" "$package_name")
          else
            tar -czf "$archive_path" -C "$dist_dir" "$package_name"
          fi

          cd "$dist_dir"
          filename="$(basename "$archive_path")"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$filename" > "$checksum_path"
          else
            shasum -a 256 "$filename" > "$checksum_path"
          fi

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04

    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true