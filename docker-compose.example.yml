name: vulcanlocaldb

services:
  vldb-lancedb:
    build:
      context: ./vldb-lancedb
      dockerfile: Dockerfile
    image: vulcan/vldb-lancedb:local
    container_name: vldb-lancedb
    ports:
      - "19301:19301"
    volumes:
      - vldb-lancedb-data:/app/data
      - ./vldb-lancedb/docker/vldb-lancedb.json:/app/config/vldb-lancedb.json:ro
    restart: unless-stopped

  vldb-duckdb:
    build:
      context: ./vldb-duckdb
      dockerfile: Dockerfile
    image: vulcan/vldb-duckdb:local
    container_name: vldb-duckdb
    ports:
      - "19401:19401"
    volumes:
      - vldb-duckdb-data:/app/data
      - ./vldb-duckdb/docker/vldb-duckdb.json:/app/config/vldb-duckdb.json:ro
    restart: unless-stopped

volumes:
  vldb-lancedb-data:
  vldb-duckdb-data:
