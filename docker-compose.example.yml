name: vulcanlocaldb

services:
  vldb-lancedb:
    build:
      context: ./vldb-lancedb
      dockerfile: Dockerfile
    image: vulcan/vldb-lancedb:local
    container_name: vldb-lancedb
    ports:
      - "19301:19301"
    volumes:
      - vldb-lancedb-data:/app/data
      - ./vldb-lancedb/docker/vldb-lancedb.json:/app/config/vldb-lancedb.json:ro
    restart: unless-stopped

  vldb-sqlite:
    build:
      context: ./vldb-sqlite
      dockerfile: Dockerfile
    image: vulcan/vldb-sqlite:local
    container_name: vldb-sqlite
    ports:
      - "19501:19501"
    volumes:
      - vldb-sqlite-data:/app/data
      - ./vldb-sqlite/docker/vldb-sqlite.json:/app/config/vldb-sqlite.json:ro
    restart: unless-stopped

volumes:
  vldb-lancedb-data:
  vldb-sqlite-data:
